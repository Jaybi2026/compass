<!DOCTYPE html>

    <style>
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 指南針旋轉動畫控制 */
        #compass-pointer {
            transform-origin: 12px 75px; /* 精準設定纖細指針的旋轉中心點 */
            transition: transform 4s cubic-bezier(0.25, 1, 0.2, 1); /* 漸慢的高級感動畫 */

            }
        };

        // 羅盤 8 個區域對應的角度 (正上方 1 區為 0 度，順時針每區加 45 度)
        const zoneAngles = { 1: 0, 2: 45, 3: 90, 4: 135, 5: 180, 6: 225, 7: 270, 8: 315 };

        // 頁面加載時渲染首頁文字
        const introContainer = document.getElementById('general-intro');
        textData.generalIntro.forEach(p => {
            const paragraph = document.createElement('p');
            paragraph.innerText = p;
            introContainer.appendChild(paragraph);
        });

        function goToStep2() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('static-image-container').classList.add('hidden');
            document.getElementById('interactive-compass-container').classList.remove('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function startSpinAnimation() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "⏳ 羅盤轉動，正在校準內在軸線...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            // 隨機選 1~8 區
            const randomZone = Math.floor(Math.random() * 8) + 1;

            // 炫目旋轉效果：先轉 5 圈 (360 * 5) 再到指定角度
            const targetAngle = zoneAngles[randomZone];
            const finalAngle = (360 * 5) + targetAngle;

            const pointer = document.getElementById('compass-pointer');
            pointer.style.transform = `rotate(${finalAngle}deg)`;

            // 4.2 秒後動畫靜止並顯示結果
            setTimeout(() => {
                showZoneResult(randomZone);
                btn.disabled = false;
                btn.innerText = "🧭 啟動指南針，隨機指向一區";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 4200);
        }

        function showZoneResult(zoneId) {
            document.getElementById('step-2').classList.add('hidden');
            
            const zoneInfo = textData.zones[zoneId];
            document.getElementById('selected-zone-title').innerText = zoneInfo.title;
            
            // 渲染解析內容
            const contentContainer = document.getElementById('selected-zone-content');
            contentContainer.innerHTML = ''; 
            zoneInfo.content.forEach(text => {
                const p = document.createElement('p');
                p.innerText = text;
                contentContainer.appendChild(p);
            });

            document.getElementById('lego-question').innerText = zoneInfo.lego;
            document.getElementById('step-3').classList.remove('hidden');
        }

        function resetToStep2() {
            document.getElementById('step-3').classList.add('hidden');
            const pointer = document.getElementById('compass-pointer');
            pointer.style.transition = 'none';
            pointer.style.transform = 'rotate(0deg)';
            void pointer.offsetHeight; 
            pointer.style.transition = 'transform 4s cubic-bezier(0.25, 1, 0.2, 1)';
            document.getElementById('step-2').classList.remove('hidden');
        }

        function goToStep4() {
            document.getElementById('interactive-compass-container').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('static-image-container').classList.remove('hidden');
            document.getElementById('step-4').classList.remove('hidden');
        }

        function restartAll() {
            document.getElementById('step-4').classList.add('hidden');
            const pointer = document.getElementById('compass-pointer');
            pointer.style.transition = 'none';
            pointer.style.transform = 'rotate(0deg)';
            void pointer.offsetHeight;
            pointer.style.transition = 'transform 4s cubic-bezier(0.25, 1, 0.2, 1)';
            document.getElementById('step-1').classList.remove('hidden');
        }
    </script>
</body>
</html>
